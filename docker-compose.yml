version: "3.9"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/handicraft
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  mongo:
    image: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"